<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Gerenciador Kanban</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Gerenciador de Tarefas 📂</h1>
        <nav>
            
            <button onclick="showSection('gerenciar')">Gerenciar Tarefas</button>
            <button onclick="showSection('cadastro-tarefa')">Nova Tarefa</button>
            <button onclick="showSection('cadastro-usuario')">Novo Usuário</button>
            
        </nav>
    </header>
    <main>
        <section id="gerenciar">
            <h2 class="section-title">Tarefas 📅</h2>
            <div class="kanban">
                <div id="col-a-fazer" class="coluna">
                    <div class="coluna-header">A Fazer 📝</div>
                    <div class="cards"></div>
                </div>
                <div id="col-fazendo" class="coluna">
                    <div class="coluna-header">Em Andamento ⌛</div>
                    <div class="cards"></div>
                </div>
                <div id="col-pronto" class="coluna">
                    <div class="coluna-header">Pronto ✅</div>
                    <div class="cards"></div>
                </div>
            </div>
        </section>
        <section id="cadastro-tarefa" style="display: none;">
            <h2 class="section-title">Cadastrar Nova Tarefa</h2>
            <div class="form-container">
                <form id="form-tarefa">
                    <label>Usuário Responsável:</label>
                    <select id="task-usuario" required></select>
                    <label>Descrição da Tarefa:</label>
                    <input type="text" id="task-descricao" required>
                    <label>Setor:</label>
                    <input type="text" id="task-setor" required>
                    <label>Prioridade:</label>
                    <select id="task-prioridade">
                        <option value="Alta">Alta</option>
                        <option value="Media" selected>Média</option>
                        <option value="Baixa">Baixa</option>
                    </select>

                    <button type="submit" class="btn-primary">Criar Tarefa</button>
                </form>
            </div>
        </section>
        <section id="cadastro-usuario" style="display: none;">
            <h2 class="section-title">Cadastrar Novo Usuário</h2>
            <div class="form-container">
                <form id="form-usuario">
                    <label>Nome:</label>
                    <input type="text" id="user-nome" required>
                    <label>E-mail:</label>
                    <input type="email" id="user-email" required>
                    <button type="submit" class="btn-primary">Criar Usuário</button>
                </form>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
